apiVersion: v1
kind: ConfigMap
metadata:
  name: mon-kb-config
  namespace: monitoring
data:
  kibana.yml: |
    server.host: "0.0.0.0"
    server.name: "mon-kibana"
    elasticsearch.hosts: ["http://mon-es-svc:9200"]
    elasticsearch.username: "kibana_system"
    elasticsearch.password: "changeme"
    monitoring.ui.enabled: true
    monitoring.kibana.collection.enabled: false
    xpack.encryptedSavedObjects.encryptionKey: "a7wk5GidF9xP2qR8mN4vB1cY6hT0eLpX"
    xpack.security.encryptionKey: "b7yH2JkfM3nQ9pS5tW8xZ0uA4dG6iRqW"
    xpack.reporting.encryptionKey: "c1eL8TnfR4qP7sW2xY5zA0bD3gI6jKmN"
---
apiVersion: v1
kind: Service
metadata:
  name: mon-kb-svc
  namespace: monitoring
spec:
  selector:
    app: mon-kb
  ports:
    - name: http
      port: 5601
      targetPort: 5601
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mon-kb
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mon-kb
  template:
    metadata:
      labels:
        app: mon-kb
    spec:
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:8.19.11
          ports:
            - containerPort: 5601
              name: http
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=512"
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /usr/share/kibana/config/kibana.yml
              subPath: kibana.yml
          readinessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: config
          configMap:
            name: mon-kb-config
