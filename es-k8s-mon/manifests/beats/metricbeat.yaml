apiVersion: v1
kind: ServiceAccount
metadata:
  name: metricbeat
  namespace: dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: metricbeat
rules:
  - apiGroups: [""]
    resources: ["nodes", "namespaces", "events", "pods", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets", "deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: metricbeat
subjects:
  - kind: ServiceAccount
    name: metricbeat
    namespace: dev
roleRef:
  kind: ClusterRole
  name: metricbeat
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: metricbeat-config
  namespace: dev
data:
  metricbeat.yml: |
    metricbeat.modules:
      - module: elasticsearch
        xpack.enabled: true
        period: 10s
        hosts: ["http://dev-es-svc.dev:9200"]
        scope: cluster
        username: "elastic"
        password: "changeme"
      - module: kibana
        xpack.enabled: true
        period: 10s
        hosts: ["http://dev-kb-svc.dev:5601"]
        username: "elastic"
        password: "changeme"

    output.elasticsearch:
      hosts: ["http://mon-es-svc.monitoring:9200"]
      username: "elastic"
      password: "changeme"

    monitoring.enabled: true
    monitoring.elasticsearch:
      hosts: ["http://mon-es-svc.monitoring:9200"]
      username: "elastic"
      password: "changeme"

    logging.level: info
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metricbeat
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metricbeat
  template:
    metadata:
      labels:
        app: metricbeat
    spec:
      serviceAccountName: metricbeat
      containers:
        - name: metricbeat
          image: docker.elastic.co/beats/metricbeat:8.19.11
          args: ["-c", "/etc/metricbeat/metricbeat.yml", "-e"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/metricbeat/metricbeat.yml
              subPath: metricbeat.yml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: metricbeat-config
