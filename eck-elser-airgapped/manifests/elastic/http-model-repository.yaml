apiVersion: apps/v1
kind: Deployment
metadata:
  name: elser-model-repository
  namespace: __NAMESPACE__
  labels:
    app: elser-model-repository
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elser-model-repository
  template:
    metadata:
      labels:
        app: elser-model-repository
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /elser_model_2.metadata.json
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: elser-models
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: elser-models
          hostPath:
            path: __MODEL_ARTIFACTS_NODE_PATH__
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: elser-model-repository
  namespace: __NAMESPACE__
spec:
  type: ClusterIP
  selector:
    app: elser-model-repository
  ports:
    - name: http
      port: 80
      targetPort: http
