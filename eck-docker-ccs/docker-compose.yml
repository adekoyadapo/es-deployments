services:
  remote-es:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ES_VERSION:-9.4.2}
    container_name: eck-docker-ccs-remote-es
    networks:
      default:
        aliases:
          - remote-http
    environment:
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-changeme}
      ES_JAVA_OPTS: -Xms1g -Xmx1g
      discovery.type: single-node
      cluster.name: ${REMOTE_CLUSTER_NAME:-remote-docker}
      node.name: remote-es-01
      network.host: 0.0.0.0
      transport.host: 0.0.0.0
      remote_cluster.host: 0.0.0.0
      remote_cluster_server.enabled: "true"
      xpack.security.enabled: "true"
      xpack.security.http.ssl.enabled: "true"
      xpack.security.http.ssl.certificate_authorities: certs/ca/remote-http-ca.crt
      xpack.security.http.ssl.certificate: certs/remote-http/remote-http.crt
      xpack.security.http.ssl.key: certs/remote-http/remote-http.key
      xpack.security.transport.ssl.enabled: "true"
      xpack.security.transport.ssl.verification_mode: certificate
      xpack.security.transport.ssl.certificate_authorities: certs/trusted-transport-ca.crt
      xpack.security.transport.ssl.certificate: certs/remote-transport/remote-transport.crt
      xpack.security.transport.ssl.key: certs/remote-transport/remote-transport.key
      xpack.security.remote_cluster_server.ssl.enabled: "true"
      xpack.security.remote_cluster_server.ssl.certificate_authorities: certs/ca/remote-rcs-ca.crt
      xpack.security.remote_cluster_server.ssl.certificate: certs/remote-rcs/remote-rcs.crt
      xpack.security.remote_cluster_server.ssl.key: certs/remote-rcs/remote-rcs.key
    ports:
      - "${REMOTE_HTTP_PORT:-9201}:9200"
      - "${REMOTE_TRANSPORT_PORT:-9300}:9300"
      - "${REMOTE_CLUSTER_SERVER_PORT:-9443}:9443"
    volumes:
      - remote-es-data:/usr/share/elasticsearch/data
      - ./certs:/usr/share/elasticsearch/config/certs:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --silent --fail --cacert config/certs/ca/remote-http-ca.crt -u elastic:${ELASTIC_PASSWORD:-changeme} https://127.0.0.1:9200/_cluster/health >/dev/null"
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  remote-kibana:
    image: docker.elastic.co/kibana/kibana:${ES_VERSION:-9.4.2}
    container_name: eck-docker-ccs-remote-kibana
    depends_on:
      remote-es:
        condition: service_healthy
    environment:
      SERVER_NAME: remote-kibana
      SERVER_HOST: 0.0.0.0
      SERVER_PUBLICBASEURL: http://${DOCKER_KB_HOST:-localhost}:${REMOTE_KIBANA_PORT:-5602}
      ELASTICSEARCH_HOSTS: https://remote-http:9200
      ELASTICSEARCH_USERNAME: kibana_system
      ELASTICSEARCH_PASSWORD: ${KIBANA_PASSWORD:-changeme}
      ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES: /usr/share/kibana/config/certs/ca/remote-http-ca.crt
      XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY: 0123456789abcdef0123456789abcdef
      XPACK_SECURITY_ENCRYPTIONKEY: abcdef0123456789abcdef0123456789
      XPACK_REPORTING_ENCRYPTIONKEY: 9876543210abcdef9876543210abcdef
    ports:
      - "${REMOTE_KIBANA_PORT:-5602}:5601"
    volumes:
      - ./certs:/usr/share/kibana/config/certs:ro

volumes:
  remote-es-data:
